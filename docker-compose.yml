services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform_a
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/platform_a
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
    volumes:
      - uploads:/app/uploads
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 9000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
