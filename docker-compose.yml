services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform_a
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/platform_a
      SECRET_KEY: ${SECRET_KEY}
      BASE_URL: https://${DOMAIN:-localhost}/api
      CORS_ORIGINS: https://${DOMAIN:-localhost}
    volumes:
      - uploads:/app/uploads
    ports:
      - "9000:9000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python init_db.py && python migrate_coords.py && uvicorn main:app --host 0.0.0.0 --port 9000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    depends_on:
      - frontend

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
