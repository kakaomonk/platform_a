services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: platform_a
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-changeme}@db:5432/platform_a
      SECRET_KEY: ${SECRET_KEY}
      BASE_URL: http://${SERVER_HOST:-localhost}/api
      CORS_ORIGINS: http://${SERVER_HOST:-localhost}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health').read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: >
      sh -c "python init_db.py && python migrate_coords.py && uvicorn main:app --host 0.0.0.0 --port 9000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
